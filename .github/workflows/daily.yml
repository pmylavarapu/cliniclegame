name: Extend puzzle horizon

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      date_start:
        description: 'YYYY-MM-DD, inclusive (default today)'
        required: false
      date_end:
        description: 'YYYY-MM-DD, inclusive (default today+60)'
        required: false

concurrency:
  group: clinicle-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  extend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-sapbert-v1

      - name: Cache MeSH descriptor XML
        uses: actions/cache@v4
        with:
          path: data/mesh_desc.xml
          key: mesh-desc-2026-v1

      - name: Cache embeddings
        uses: actions/cache@v4
        with:
          path: data/embeddings
          key: emb-${{ hashFiles('data/vocab.txt') }}
          restore-keys: |
            emb-

      - name: Ensure vocab exists
        run: '[ -s data/vocab.txt ] || python3 scripts/build_vocab.py'

      - name: Ensure schedule exists
        run: '[ -s data/schedule.json ] || python3 scripts/schedule.py'

      - name: Embed vocab (idempotent, cached)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -s data/embeddings/vocab.npy ]; then
            echo "Embeddings cache hit — skipping embed"
            exit 0
          fi
          if [ -z "$GOOGLE_API_KEY" ]; then
            echo "::error::GOOGLE_API_KEY secret is not set and there is no cached embedding."
            echo "::error::Add the secret in Repo → Settings → Secrets and variables → Actions,"
            echo "::error::then re-run this workflow."
            exit 1
          fi
          python3 scripts/embed.py

      - name: Generate prompts for upcoming diagnoses
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "No ANTHROPIC_API_KEY set; skipping prompt generation"; exit 0
          fi
          python3 - <<'PY'
          import json
          from datetime import date, timedelta
          sched = json.loads(open("data/schedule.json").read())
          horizon = (date.today() + timedelta(days=90)).isoformat()
          upcoming = sorted({v for k, v in sched.items() if k <= horizon and k >= date.today().isoformat()})
          with open("/tmp/dx_subset.txt", "w") as f:
              f.write("\n".join(upcoming))
          PY
          DX_SUBSET=/tmp/dx_subset.txt python3 scripts/prompts.py

      - name: Precompute puzzles
        env:
          DATE_START: ${{ github.event.inputs.date_start }}
          DATE_END: ${{ github.event.inputs.date_end }}
        run: python3 scripts/precompute.py

      - name: Commit new puzzles
        run: |
          git config user.name  'clinicle-bot'
          git config user.email 'clinicle-bot@users.noreply.github.com'
          git add data/vocab.txt public/puzzles/ public/vocab.json public/index.json data/prompts.json
          if git diff --cached --quiet; then
            echo "no changes"; exit 0
          fi
          git commit -m "extend puzzle horizon"
          git push
